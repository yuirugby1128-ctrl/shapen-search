<script>
    // ... (CSV_URLなどはそのまま)

    async function loadData() {
        try {
            const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            const csvData = await response.text();
            const rows = csvData.split(/\r?\n/).slice(1);
            
            const rawProducts = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    name: (cols[0] || "").replace(/"/g, '').trim(),
                    maker: (cols[1] || "").replace(/"/g, '').trim(),
                    tags: (cols[2] || "").replace(/"/g, '').split(',').map(t => t.trim()),
                    desc: (cols[3] || "").replace(/"/g, '').trim(),
                    url: (cols[4] || "").replace(/"/g, '').trim()
                };
            }).filter(p => p.name);

            // 【重複統合ロジック】名前のメイン部分で集約
            const merged = {};
            rawProducts.forEach(p => {
                // 「スマッシュ (赤)」などのカッコ内を除いた名前をベースにする
                const baseName = p.name.split('(')[0].split('（')[0].trim();
                const colorInfo = p.name.match(/[\(（](.*?)[\)）]/);
                const colorLabel = colorInfo ? colorInfo[1] : "";

                if (!merged[baseName]) {
                    merged[baseName] = { ...p, name: baseName, colors: [], allTags: new Set(p.tags) };
                }
                if (colorLabel) merged[baseName].colors.push(colorLabel);
                p.tags.forEach(t => merged[baseName].allTags.add(t));
                
                // 「しーさー」が含まれていれば自動処理
                if (p.name.includes('しーさー') || Array.from(merged[baseName].allTags).includes('しーさー')) {
                    merged[baseName].allTags.add('しーさー');
                    merged[baseName].allTags.add('コラボ');
                }
            });

            allProducts = Object.values(merged).map(p => ({
                ...p,
                tags: Array.from(p.allTags),
                // 説明文の冒頭にカラーバリエーションを追記
                desc: p.colors.length > 0 ? `【展開カラー: ${[...new Set(p.colors)].join(' / ')}】\n${p.desc}` : p.desc
            }));

            document.getElementById('loading').style.display = 'none';
            render();
        } catch (e) {
            document.getElementById('loading').innerText = "ERROR";
        }
    }

    function render() {
        const list = document.getElementById('productList');
        const query = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allProducts.filter(p => {
            const searchStr = (p.name + p.maker + p.desc + p.tags.join('')).toLowerCase();
            const matchesSearch = searchStr.includes(query);
            if (currentFilter === '★ お気に入り') return matchesSearch && favorites.includes(p.name);
            return matchesSearch && (currentFilter === 'すべて' || p.tags.includes(currentFilter));
        });

        list.innerHTML = "";
        filtered.forEach(p => {
            const isFav = favorites.includes(p.name);
            const isLimited = p.tags.includes('限定色');
            const isSeasar = p.tags.includes('しーさー');
            const colorBadge = p.colors.length > 0 ? `<span class="ml-2 text-[10px] bg-black text-white px-1">${[...new Set(p.colors)].length}色</span>` : "";

            list.innerHTML += `
                <div class="sharp-card p-6 cursor-pointer" onclick="openDetail('${encodeURIComponent(p.name)}')">
                    ${isLimited ? '<div class="limited-badge">LIMITED</div>' : ''}
                    ${isSeasar ? '<div class="special-badge">SEASAR</div>' : ''}
                    <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${p.name}', event)">⭐</div>
                    <p class="text-[9px] font-black text-blue-600 uppercase mb-1">${p.maker}</p>
                    <h3 class="text-sm font-black italic mb-4 border-b-2 border-gray-100 pb-2">${p.name}${colorBadge}</h3>
                    <div class="flex flex-wrap gap-1 mb-6">
                        ${p.tags.map(t => t ? `<span class="bg-gray-100 text-[8px] px-2 py-1 font-black border border-gray-200">${t}</span>` : '').join('')}
                    </div>
                    <div class="mt-auto text-[10px] font-black italic text-gray-300">DETAILS & COLORS →</div>
                </div>`;
        });
        document.getElementById('resultCount').innerText = `${filtered.length} MODELS ARCHIVED`;
    }
    // ... (以降の関数は維持)
</script>
