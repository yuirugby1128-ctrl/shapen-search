<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHARPEN PRICE DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0f14; color: #f3f4f6; }
        .sharp-card { background: #1a1d24; border: 1px solid #2d333d; border-radius: 12px; position: relative; }
        .fav-star { font-size: 24px; cursor: pointer; transition: 0.3s; color: #374151; }
        .fav-star.active { color: #fbbf24; }
        
        /* 合計表示エリア */
        .total-bar { position: fixed; top: 0; left: 0; right: 0; background: #3b82f6; color: white; padding: 10px; text-align: center; font-weight: 900; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d24; border-top: 1px solid #2d333d; display: flex; justify-content: space-around; padding: 15px; z-index: 100; }
        
        #filterModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end; }
        .modal-content { background: #1a1d24; width: 100%; border-radius: 24px 24px 0 0; padding: 24px; }
    </style>
</head>
<body class="pt-16 pb-24">

    <div class="total-bar" id="totalPriceBar">選択中の合計: ¥0</div>

    <header class="p-6 max-w-7xl mx-auto">
        <h1 class="text-3xl font-black italic tracking-tighter">SHARPEN <span class="text-blue-500">LIST</span></h1>
        <input type="text" id="searchInput" placeholder="検索..." class="w-full bg-[#1a1d24] border border-[#2d333d] rounded-xl p-4 mt-4 text-white font-bold outline-none">
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div id="productList" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </main>

    <div id="filterModal" onclick="closeFilter()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="text-xl font-black mb-6">絞り込み</h3>
            <div class="grid grid-cols-2 gap-2 mb-8">
                <button onclick="applyFilter('木軸')" class="bg-gray-800 py-3 rounded-xl text-xs font-bold">木軸</button>
                <button onclick="applyFilter('低重心')" class="bg-gray-800 py-3 rounded-xl text-xs font-bold">低重心</button>
                <button onclick="applyFilter('自動芯出し')" class="bg-gray-800 py-3 rounded-xl text-xs font-bold">自動芯出し</button>
                <button onclick="applyFilter('製図')" class="bg-gray-800 py-3 rounded-xl text-xs font-bold">製図</button>
                <button onclick="applyFilter('限定色')" class="bg-gray-800 py-3 rounded-xl text-xs font-bold text-red-400">限定色</button>
                <button onclick="applyFilter('すべて')" class="bg-blue-600 py-3 rounded-xl text-xs font-bold col-span-2">リセット</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button onclick="applyFilter('すべて')" class="font-bold text-xs">HOME</button>
        <button onclick="openFilter()" class="font-bold text-xs text-blue-400">FILTER</button>
        <button onclick="applyFilter('FAV')" class="font-bold text-xs text-yellow-500">FAVORITES</button>
    </nav>

    <script>
        const SPREADSHEET_ID = '1EouOo6sNYzOLsOgqP1HLNLq9-MZdX-p1owDIFr-kBF0';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        let allProducts = [];
        let currentFilter = 'すべて';
        let favorites = JSON.parse(localStorage.getItem('penFavs')) || [];

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).slice(1);
                allProducts = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        name: (cols[0] || "").replace(/"/g, '').trim(),
                        maker: (cols[1] || "").replace(/"/g, '').trim(),
                        tags: (cols[2] || "").replace(/"/g, '').split(','),
                        price: parseInt((cols[5] || "0").replace(/[^0-9]/g, '')) // F列を数値として取得
                    };
                }).filter(p => p.name);
                render();
            } catch (e) { console.error(e); }
        }

        function toggleFav(name) {
            if(favorites.includes(name)) {
                favorites = favorites.filter(f => f !== name);
            } else {
                favorites.push(name);
            }
            localStorage.setItem('penFavs', JSON.stringify(favorites));
            updateTotalPrice();
            render();
        }

        function updateTotalPrice() {
            const total = allProducts
                .filter(p => favorites.includes(p.name))
                .reduce((sum, p) => sum + p.price, 0);
            document.getElementById('totalPriceBar').innerText = `お気に入り合計: ¥${total.toLocaleString()}`;
        }

        function render() {
            const list = document.getElementById('productList');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchesSearch = (p.name + p.maker).toLowerCase().includes(query);
                if (currentFilter === 'FAV') return matchesSearch && favorites.includes(p.name);
                return matchesSearch && (currentFilter === 'すべて' || p.tags.includes(currentFilter));
            });

            list.innerHTML = filtered.map(p => {
                const isFav = favorites.includes(p.name);
                return `
                <div class="sharp-card p-4" onclick="toggleFav('${p.name}')">
                    <div class="flex justify-between">
                        <p class="text-[8px] font-bold text-blue-400">${p.maker}</p>
                        <span class="fav-star ${isFav ? 'active' : ''}">★</span>
                    </div>
                    <h3 class="text-xs font-bold mt-1">${p.name}</h3>
                    <p class="text-sm font-black mt-2 text-white">¥${p.price.toLocaleString()}</p>
                </div>`;
            }).join('');
            updateTotalPrice();
        }

        function openFilter() { document.getElementById('filterModal').style.display = 'flex'; }
        function closeFilter() { document.getElementById('filterModal').style.display = 'none'; }
        function applyFilter(tag) { currentFilter = tag; closeFilter(); render(); }
        document.getElementById('searchInput').addEventListener('input', render);
        loadData();
    </script>
</body>
</html>
