<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SHARPEN DATABASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #f8f9fa; color: #1a1a1a; }
        .sharp-card { background: white; border: 2px solid #000; transition: 0.2s; position: relative; min-height: 160px; }
        .sharp-card:hover { transform: translate(-4px, -4px); box-shadow: 6px 6px 0px #000; }
        .filter-btn { border: 2px solid #000; background: white; padding: 6px 12px; font-size: 11px; font-weight: 900; cursor: pointer; transition: 0.1s; white-space: nowrap; }
        .filter-btn:hover, .filter-btn.active { background: #000; color: #fff; }
        #detailModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b-4 border-black sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <h1 class="text-3xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">SHARPEN <span class="text-red-600">DB</span></h1>
                <div class="flex-grow max-w-2xl w-full">
                    <input type="text" id="searchInput" placeholder="製品名・メーカー・特徴で検索..." 
                           class="w-full border-2 border-black p-3 outline-none focus:bg-yellow-50 font-bold placeholder-gray-400">
                </div>
            </div>
            <div id="tagFilters" class="flex flex-wrap gap-2 mt-4 overflow-x-auto pb-2">
                <button onclick="filterByTag('すべて')" class="filter-btn active">すべて</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 mt-8">
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loading-spinner mb-4"></div>
            <p class="font-black italic text-gray-500 tracking-widest">CONNECTING TO PRIVATE DATABASE...</p>
        </div>
        <div id="resultCount" class="text-[10px] font-black text-gray-400 mb-6 tracking-[0.2em] uppercase"></div>
        <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="detailModal" onclick="closeModal()">
        <div class="bg-white max-w-2xl w-full p-8 relative shadow-[10px_10px_0px_#333]" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-4xl font-light hover:scale-110 transition">&times;</button>
            <p id="m-maker" class="text-xs font-black text-blue-600 uppercase tracking-widest mb-1"></p>
            <h2 id="m-title" class="text-4xl font-black italic tracking-tighter mb-6 border-l-8 border-black pl-4"></h2>
            <div class="bg-gray-100 p-6 mb-8 border-2 border-black">
                <h4 class="text-[10px] font-black text-gray-400 uppercase mb-2">Description / 説明</h4>
                <p id="m-desc" class="text-sm font-bold leading-relaxed text-gray-800"></p>
            </div>
            <a id="m-link" href="#" target="_blank" class="block w-full bg-black text-white text-center font-black py-5 hover:opacity-80 transition tracking-[0.3em] text-sm">OFFICIAL SITE</a>
        </div>
    </div>

    <script>
        // あなたの個人用スプレッドシートのCSV変換URLです
        const SPREADSHEET_ID = '1EouOo6sNYzOLsOgqP1HLNLq9-MZdX-p1owDIFr-kBF0';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
        
        let allProducts = [];
        let currentFilter = 'すべて';

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('読み込み失敗');
                const csvData = await response.text();
                
                const rows = csvData.split(/\r?\n/).slice(1); 

                allProducts = rows.map(row => {
                    // カンマ区切りのパース（引用符内のカンマを無視）
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    return {
                        name: (cols[0] || "").replace(/"/g, '').trim(),
                        maker: (cols[1] || "").replace(/"/g, '').trim(),
                        tags: (cols[2] || "").replace(/"/g, '').split(',').map(t => t.trim()),
                        desc: (cols[3] || "").replace(/"/g, '').trim(),
                        url: (cols[4] || "").replace(/"/g, '').trim()
                    };
                }).filter(p => p.name && p.name !== "名前");

                document.getElementById('loading').style.display = 'none';
                generateTagFilters();
                render();
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = `
                    <div class="text-center p-10 border-2 border-red-500 bg-red-50">
                        <p class="font-black text-red-600 mb-2">DATABASE CONNECTION ERROR</p>
                        <p class="text-xs font-bold text-gray-600">
                            1. スプレッドシートの右上の「共有」をクリック<br>
                            2. 「リンクを知っている全員」に設定されているか確認してください。
                        </p>
                    </div>`;
            }
        }

        function generateTagFilters() {
            const tagSet = new Set();
            allProducts.forEach(p => p.tags.forEach(t => { if(t) tagSet.add(t) }));
            const filterContainer = document.getElementById('tagFilters');
            tagSet.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = tag;
                btn.onclick = () => filterByTag(tag);
                filterContainer.appendChild(btn);
            });
        }

        function filterByTag(tag) {
            currentFilter = tag;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === tag);
            });
            render();
        }

        function render() {
            const list = document.getElementById('productList');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const searchStr = (p.name + p.maker + p.desc).toLowerCase();
                const matchesSearch = searchStr.includes(query);
                const matchesTag = currentFilter === 'すべて' || p.tags.includes(currentFilter);
                return matchesSearch && matchesTag;
            });
            document.getElementById('resultCount').innerText = `${filtered.length} ARCHIVES LOADED`;
            list.innerHTML = "";
            filtered.forEach((p) => {
                list.innerHTML += `
                    <div class="sharp-card p-6 cursor-pointer flex flex-col" onclick="openDetail('${encodeURIComponent(p.name)}')">
                        <p class="text-[9px] font-black text-blue-600 uppercase tracking-tighter mb-1">${p.maker}</p>
                        <h3 class="text-sm font-black italic mb-4 border-b-2 border-gray-100 pb-2">${p.name}</h3>
                        <div class="flex flex-wrap gap-1 mb-6">
                            ${p.tags.map(t => t ? `<span class="bg-gray-100 text-[8px] px-2 py-1 font-black rounded-sm border border-gray-200">${t}</span>` : '').join('')}
                        </div>
                        <div class="mt-auto flex justify-between items-center text-[10px] font-black italic">
                            <span>DETAILS</span>
                            <span class="text-gray-300">VIEW →</span>
                        </div>
                    </div>`;
            });
        }

        function openDetail(name) {
            const p = allProducts.find(item => item.name === decodeURIComponent(name));
            if(!p) return;
            document.getElementById('m-title').innerText = p.name;
            document.getElementById('m-maker').innerText = p.maker;
            document.getElementById('m-desc').innerText = p.desc;
            document.getElementById('m-link').href = p.url || "#";
            document.getElementById('detailModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('detailModal').style.display = "none"; }
        document.getElementById('searchInput').addEventListener('input', render);
        loadData();
    </script>
</body>
</html>
