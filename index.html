<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARPEN - THE DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #0f1115; color: #e5e7eb; }
        
        /* カードデザイン */
        .sharp-card { background: #1f2937; border: 1px solid #374151; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border-radius: 12px; overflow: hidden; }
        .sharp-card:hover { transform: translateY(-5px); border-color: #60a5fa; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        
        /* お気に入り星マーク */
        .fav-star { font-size: 24px; cursor: pointer; transition: 0.3s; color: #4b5563; }
        .fav-star.active { color: #fbbf24; filter: drop-shadow(0 0 5px #fbbf24); }

        /* 絞り込みパネル */
        #filterPanel { display: none; background: #111827; border-bottom: 2px solid #3b82f6; }
        
        /* 筆箱シミュレーター風表示 */
        .pencase-slot { background: #111827; border: 2px dashed #374151; border-radius: 15px; height: 120px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; font-size: 10px; font-weight: 900; }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f1115; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 p-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <h1 class="text-4xl font-black tracking-tighter italic">SHARPEN<span class="text-blue-500">DB</span></h1>
                
                <div class="flex w-full md:w-2/3 gap-2">
                    <input type="text" id="searchInput" placeholder="Search models, makers..." 
                           class="flex-grow bg-gray-800 border border-gray-700 rounded-lg p-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-white">
                    <button onclick="toggleFilter()" class="bg-gray-800 border border-gray-700 px-6 rounded-lg font-black text-sm hover:bg-gray-700 transition flex items-center gap-2">
                        <span>FILTER</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                </div>
            </div>

            <div id="filterPanel" class="mt-6 p-6 rounded-xl">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                        <p class="text-[10px] font-black text-gray-500 mb-2 uppercase">Category</p>
                        <div class="flex flex-wrap gap-2" id="cat-filters">
                            <button onclick="setFilter('すべて')" class="filter-tag active bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold">すべて</button>
                            <button onclick="setFilter('しーさー')" class="filter-tag bg-gray-800 px-3 py-1 rounded text-xs font-bold hover:bg-gray-700">しーさー</button>
                            <button onclick="setFilter('筆箱')" class="filter-tag bg-gray-800 px-3 py-1 rounded text-xs font-bold hover:bg-gray-700">筆箱</button>
                            <button onclick="setFilter('消しゴム')" class="filter-tag bg-gray-800 px-3 py-1 rounded text-xs font-bold hover:bg-gray-700">消しゴム</button>
                        </div>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-gray-500 mb-2 uppercase">Status</p>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="setFilter('限定色')" class="filter-tag bg-gray-800 px-3 py-1 rounded text-xs font-bold">限定</button>
                            <button onclick="setFilter('廃番')" class="filter-tag bg-gray-800 px-3 py-1 rounded text-xs font-bold">廃番</button>
                            <button onclick="setFilter('伝説')" class="filter-tag bg-gray-800 px-3 py-1 rounded text-xs font-bold">伝説</button>
                        </div>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-gray-500 mb-2 uppercase">Special</p>
                        <button onclick="showFavorites()" class="w-full bg-yellow-500 text-black font-black py-2 rounded text-xs">MY PEN CASE (★)</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="simulatorArea" class="hidden mb-12">
            <h2 class="text-2xl font-black mb-6 italic text-yellow-500">MY PEN CASE SIMULATOR</h2>
            <div id="pencase-grid" class="grid grid-cols-2 sm:grid-cols-5 gap-4"></div>
            <div class="mt-4 text-[10px] text-gray-500 font-bold">※お気に入りしたペンが自動的にスタメン入りします（最大10本）</div>
        </div>

        <div id="loading" class="text-center py-20 font-black text-gray-600 animate-pulse">SYNCHRONIZING DB...</div>
        <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <script>
        const SPREADSHEET_ID = '1EouOo6sNYzOLsOgqP1HLNLq9-MZdX-p1owDIFr-kBF0';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        let allProducts = [];
        let currentFilter = 'すべて';
        let favorites = JSON.parse(localStorage.getItem('penFavs')) || [];

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).slice(1);
                const merged = {};

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) return;
                    let fullName = (cols[0] || "").replace(/"/g, '').trim();
                    let maker = (cols[1] || "").replace(/"/g, '').trim();
                    let tags = (cols[2] || "").replace(/"/g, '').split(',').map(t => t.trim());
                    let desc = (cols[3] || "").replace(/"/g, '').trim();

                    const baseName = fullName.split(/[（(]/)[0].trim();
                    const color = fullName.match(/[（(](.*?)[）)]/)?.[1] || "";

                    if (!merged[baseName]) {
                        merged[baseName] = { name: baseName, maker, tags: new Set(tags), desc, colors: new Set() };
                    }
                    if (color) merged[baseName].colors.add(color);
                    tags.forEach(t => merged[baseName].tags.add(t));
                });

                allProducts = Object.values(merged).map(p => ({
                    ...p, tags: Array.from(p.tags),
                    displayDesc: p.colors.size > 0 ? `【Colors: ${Array.from(p.colors).join(' / ')}】\n\n${p.desc}` : p.desc
                }));
                document.getElementById('loading').style.display = 'none';
                render();
            } catch (e) { document.getElementById('loading').innerText = "CONNECTION ERROR"; }
        }

        function toggleFilter() {
            const panel = document.getElementById('filterPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function setFilter(tag) {
            currentFilter = tag;
            document.getElementById('simulatorArea').classList.add('hidden');
            render();
        }

        function showFavorites() {
            currentFilter = 'FAV';
            document.getElementById('simulatorArea').classList.remove('hidden');
            updateSimulator();
            render();
        }

        function toggleFav(name, event) {
            event.stopPropagation();
            if(favorites.includes(name)) {
                favorites = favorites.filter(f => f !== name);
            } else {
                if(favorites.length >= 10) return;
                favorites.push(name);
            }
            localStorage.setItem('penFavs', JSON.stringify(favorites));
            updateSimulator();
            render();
        }

        function updateSimulator() {
            const grid = document.getElementById('pencase-grid');
            grid.innerHTML = Array.from({length: 10}).map((_, i) => {
                const name = favorites[i];
                return `<div class="pencase-slot">${name ? name : '+ EMPTY'}</div>`;
            }).join('');
        }

        function render() {
            const list = document.getElementById('productList');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchesSearch = (p.name + p.maker).toLowerCase().includes(query);
                if (currentFilter === 'FAV') return matchesSearch && favorites.includes(p.name);
                return matchesSearch && (currentFilter === 'すべて' || p.tags.includes(currentFilter));
            });

            list.innerHTML = filtered.map(p => {
                const isFav = favorites.includes(p.name);
                return `
                <div class="sharp-card p-5">
                    <div class="flex justify-between items-start mb-4">
                        <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${p.maker}</p>
                        <span onclick="toggleFav('${p.name}', event)" class="fav-star ${isFav ? 'active' : ''}">★</span>
                    </div>
                    <h3 class="text-lg font-bold leading-tight mb-4">${p.name}</h3>
                    <div class="flex flex-wrap gap-1">
                        ${p.tags.slice(0, 3).map(t => `<span class="text-[8px] px-2 py-0.5 bg-gray-800 text-gray-400 font-bold rounded">${t}</span>`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', render);
        loadData();
    </script>
</body>
</html>
