<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WRITING INSTRUMENT DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #f8f9fa; color: #1a1a1a; }
        .sharp-card { background: white; border: 2px solid #000; transition: 0.2s; position: relative; min-height: 180px; display: flex; flex-direction: column; }
        .sharp-card:hover { transform: translate(-4px, -4px); box-shadow: 6px 6px 0px #000; }
        .filter-btn { border: 2px solid #000; background: white; padding: 6px 12px; font-size: 11px; font-weight: 900; cursor: pointer; transition: 0.1s; white-space: nowrap; }
        .filter-btn:hover, .filter-btn.active { background: #000; color: #fff; }
        #detailModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .fav-btn { position: absolute; top: 10px; right: 10px; font-size: 20px; cursor: pointer; z-index: 10; transition: 0.2s; filter: grayscale(1); }
        .fav-btn.active { filter: grayscale(0); transform: scale(1.2); }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b-4 border-black sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <h1 class="text-3xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">WRITING <span class="text-red-600">DB</span></h1>
                <div class="flex-grow max-w-2xl w-full">
                    <input type="text" id="searchInput" placeholder="ペン名・メーカー・特徴で検索..." 
                           class="w-full border-2 border-black p-3 outline-none focus:bg-yellow-50 font-bold">
                </div>
            </div>
            <div id="tagFilters" class="flex flex-wrap gap-2 mt-4 overflow-x-auto pb-2">
                <button onclick="filterByTag('すべて')" class="filter-btn active">すべて</button>
                <button onclick="filterByTag('★ お気に入り')" class="filter-btn text-yellow-600 font-black">★ FAVORITES</button>
                <button onclick="filterByTag('ボールペン')" class="filter-btn border-blue-500 text-blue-600">ボールペン</button>
                <button onclick="filterByTag('3in1')" class="filter-btn border-green-500 text-green-600">3in1 / 多機能</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 mt-8">
        <div id="loading" class="text-center py-20 font-black italic text-gray-400">CONNECTING...</div>
        <div id="resultCount" class="text-[10px] font-black text-gray-400 mb-6 tracking-[0.2em] uppercase"></div>
        <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="detailModal" onclick="closeModal()">
        <div class="bg-white max-w-2xl w-full p-8 relative shadow-[10px_10px_0px_#333]" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-4xl font-light">&times;</button>
            <p id="m-maker" class="text-xs font-black text-blue-600 uppercase mb-1"></p>
            <h2 id="m-title" class="text-4xl font-black italic mb-6 border-l-8 border-black pl-4"></h2>
            <div class="bg-gray-100 p-6 mb-8 border-2 border-black">
                <p id="m-desc" class="text-sm font-bold leading-relaxed text-gray-800"></p>
            </div>
            <a id="m-link" href="#" target="_blank" class="block w-full bg-black text-white text-center font-black py-5 tracking-[0.3em] text-sm hover:opacity-80">VIEW OFFICIAL</a>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1EouOo6sNYzOLsOgqP1HLNLq9-MZdX-p1owDIFr-kBF0';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
        
        let allProducts = [];
        let currentFilter = 'すべて';
        let favorites = JSON.parse(localStorage.getItem('sharpenFavs')) || [];

        async function loadData() {
            try {
                const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).slice(1); 
                allProducts = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    return {
                        name: (cols[0] || "").replace(/"/g, '').trim(),
                        maker: (cols[1] || "").replace(/"/g, '').trim(),
                        tags: (cols[2] || "").replace(/"/g, '').split(',').map(t => t.trim()),
                        desc: (cols[3] || "").replace(/"/g, '').trim(),
                        url: (cols[4] || "").replace(/"/g, '').trim()
                    };
                }).filter(p => p.name);
                document.getElementById('loading').style.display = 'none';
                generateTagFilters();
                render();
            } catch (e) {
                document.getElementById('loading').innerText = "ERROR";
            }
        }

        function generateTagFilters() {
            const tagSet = new Set();
            allProducts.forEach(p => p.tags.forEach(t => { if(t && !['ボールペン','3in1'].includes(t)) tagSet.add(t) }));
            const filterContainer = document.getElementById('tagFilters');
            tagSet.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = tag;
                btn.onclick = () => filterByTag(tag);
                filterContainer.appendChild(btn);
            });
        }

        function toggleFav(name, event) {
            event.stopPropagation();
            favorites.includes(name) ? favorites = favorites.filter(f => f !== name) : favorites.push(name);
            localStorage.setItem('sharpenFavs', JSON.stringify(favorites));
            render();
        }

        function filterByTag(tag) {
            currentFilter = tag;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === tag));
            render();
        }

        function render() {
            const list = document.getElementById('productList');
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allProducts.filter(p => {
                const matchesSearch = (p.name + p.maker + p.desc + p.tags.join('')).toLowerCase().includes(query);
                if (currentFilter === '★ お気に入り') return matchesSearch && favorites.includes(p.name);
                return matchesSearch && (currentFilter === 'すべて' || p.tags.includes(currentFilter));
            });
            filtered.sort((a, b) => (favorites.includes(b.name) - favorites.includes(a.name)));
            document.getElementById('resultCount').innerText = `${filtered.length} ITEMS`;
            list.innerHTML = "";
            filtered.forEach(p => {
                const isFav = favorites.includes(p.name);
                list.innerHTML += `
                    <div class="sharp-card p-6 cursor-pointer" onclick="openDetail('${encodeURIComponent(p.name)}')">
                        <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${p.name}', event)">⭐</div>
                        <p class="text-[9px] font-black text-blue-600 uppercase mb-1">${p.maker}</p>
                        <h3 class="text-sm font-black italic mb-4 border-b-2 border-gray-100 pb-2">${p.name}</h3>
                        <div class="flex flex-wrap gap-1 mb-6">
                            ${p.tags.map(t => t ? `<span class="bg-gray-100 text-[8px] px-2 py-1 font-black border border-gray-200">${t}</span>` : '').join('')}
                        </div>
                        <div class="mt-auto text-[10px] font-black italic text-gray-300">DETAILS →</div>
                    </div>`;
            });
        }

        function openDetail(name) {
            const p = allProducts.find(item => item.name === decodeURIComponent(name));
            if(!p) return;
            document.getElementById('m-title').innerText = p.name;
            document.getElementById('m-maker').innerText = p.maker;
            document.getElementById('m-desc').innerText = p.desc;
            document.getElementById('m-link').href = p.url || "#";
            document.getElementById('detailModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('detailModal').style.display = "none"; }
        document.getElementById('searchInput').addEventListener('input', render);
        loadData();
    </script>
</body>
</html>
