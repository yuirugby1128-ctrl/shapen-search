<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>文房具検索サイト | SHARPEN DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f4f8; color: #1e293b; font-family: 'Segoe UI', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%); }
        .sharp-card { background: white; border-radius: 16px; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .sharp-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .latest-news { background: #fff; border-left: 5px solid #3b82f6; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-5xl mx-auto mt-6 px-4">
        <div class="latest-news p-4 shadow-sm rounded-r-lg">
            <span class="text-blue-600 font-black text-xs uppercase tracking-widest">Latest Info</span>
            <p id="newsTicker" class="text-sm font-bold text-gray-700 mt-1">
                【2026/04】クルトガダイブ新色「ムーンライト」入荷情報を追加しました！
            </p>
        </div>
    </div>

    <header class="p-8 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text hero-gradient">STATIONERY SEARCH</h1>
        <div class="mt-6 flex justify-center gap-4 bg-blue-500 text-white p-4 rounded-full max-w-md mx-auto font-black shadow-lg">
            合計金額: <span id="totalPrice">¥0</span>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-4 mb-8">
        <input type="text" id="search" placeholder="名前やメーカーで検索..." class="w-full p-5 rounded-2xl border-none shadow-inner bg-white text-lg outline-none focus:ring-4 ring-blue-200">
        
        <div class="flex flex-wrap gap-2 mt-4" id="tags">
            </div>
    </div>

    <main class="max-w-5xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="list"></main>

    <script>
        const SPREADSHEET_ID = 'あなたのID';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
        
        let products = [];
        let favs = [];
        const targetTags = ["限定色","0.3","0.5","0.7","低重心","六角","木軸","1000円以下","自動心出し","海外","筆箱","その他の文房具","しーさー","ダブルノック","フレフレ搭載","製図用","クルトガ","高級(5000円以上)"];

        async function init() {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            products = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { name: c[0], maker: c[1], tags: c[2]?.replace(/"/g,'').split(',').map(t=>t.trim()), desc: c[3], url: c[4], price: parseInt(c[5]) || 0 };
            });
            render();
            renderTags();
        }

        function render(filterTag = '') {
            const query = document.getElementById('search').value.toLowerCase();
            const html = products.filter(p => {
                const match = p.name?.toLowerCase().includes(query) || p.maker?.toLowerCase().includes(query);
                const tagMatch = filterTag ? p.tags?.includes(filterTag) : true;
                return match && tagMatch;
            }).map(p => `
                <div class="sharp-card p-6 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">${p.maker}</span>
                            <button onclick="toggleFav('${p.name}', ${p.price})" class="text-2xl">${favs.includes(p.name) ? '⭐' : '☆'}</button>
                        </div>
                        <h2 class="text-xl font-black mt-2 text-slate-800">${p.name}</h2>
                        <div class="flex flex-wrap gap-1 mt-2">
                            ${p.tags?.map(t => `<span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded font-bold">${t}</span>`).join('')}
                        </div>
                        <p class="text-sm text-gray-500 mt-4 leading-relaxed">${p.desc}</p>
                    </div>
                    <div class="mt-6 flex justify-between items-end">
                        <span class="text-2xl font-black text-slate-900">¥${p.price.toLocaleString()}</span>
                        <a href="${p.url}" target="_blank" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-600 transition">DETAIL</a>
                    </div>
                </div>
            `).join('');
            document.getElementById('list').innerHTML = html;
        }

        function toggleFav(name, price) {
            if(favs.includes(name)) favs = favs.filter(n => n !== name);
            else favs.push(name);
            const total = products.filter(p => favs.includes(p.name)).reduce((a, b) => a + b.price, 0);
            document.getElementById('totalPrice').innerText = `¥${total.toLocaleString()}`;
            render();
        }

        function renderTags() {
            document.getElementById('tags').innerHTML = targetTags.map(t => `
                <button onclick="render('${t}')" class="bg-white border border-slate-200 px-4 py-2 rounded-full text-xs font-bold hover:bg-blue-500 hover:text-white transition shadow-sm">${t}</button>
            `).join('') + `<button onclick="render()" class="bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-bold">ALL</button>`;
        }

        document.getElementById('search').addEventListener('input', () => render());
        init();
    </script>
</body>
</html>
