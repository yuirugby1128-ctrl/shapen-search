<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARPEN SEARCH - プロ仕様検索DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }
        .amazon-border { border: 1px solid #ddd; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid #ccc; margin-right: 4px; }
        /* モーダル用 */
        #detailModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <header class="border-b border-gray-300 p-4 sticky top-0 bg-white z-20">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <h1 class="text-xl font-bold tracking-tighter shrink-0">SHARPEN SEARCH</h1>
            <div class="flex-grow max-w-2xl">
                <input type="text" id="searchInput" placeholder="製品名、メーカー、タグ、色で検索..." 
                       class="w-full border border-gray-400 p-2 rounded shadow-sm focus:outline-none focus:border-black text-sm">
            </div>
            <div class="hidden md:block text-xs text-gray-500 text-right">
                24時間自動更新(仮)<br><span id="lastUpdate"></span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto flex flex-col md:flex-row p-4 gap-6">
        <aside class="w-full md:w-64 flex-shrink-0">
            <h2 class="font-bold mb-4 border-b pb-2 text-sm">絞り込み</h2>
            <div class="mb-6 space-y-6">
                <div>
                    <h3 class="text-xs font-bold mb-2 text-gray-500 uppercase">芯径</h3>
                    <div class="space-y-1" id="filter-diameter">
                        <label class="block text-sm cursor-pointer"><input type="checkbox" value="0.3" class="filter-check"> 0.3mm</label>
                        <label class="block text-sm cursor-pointer"><input type="checkbox" value="0.5" class="filter-check"> 0.5mm</label>
                        <label class="block text-sm cursor-pointer"><input type="checkbox" value="0.7" class="filter-check"> 0.7mm</label>
                    </div>
                </div>
                <div>
                    <h3 class="text-xs font-bold mb-2 text-gray-500 uppercase">素材</h3>
                    <div class="space-y-1" id="filter-material">
                        <label class="block text-sm cursor-pointer"><input type="checkbox" value="木軸" class="filter-check"> 木軸</label>
                        <label class="block text-sm cursor-pointer"><input type="checkbox" value="金属" class="filter-check"> 金属</label>
                        <label class="block text-sm cursor-pointer"><input type="checkbox" value="樹脂" class="filter-check"> 樹脂</label>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-grow">
            <div class="mb-6 p-4 bg-orange-50 border border-orange-200 rounded">
                <h2 class="font-bold text-xs mb-2 border-b border-orange-200 pb-1 text-orange-800 tracking-widest uppercase">自動探知: 最新文房具ニュース</h2>
                <ul id="newsList" class="text-xs space-y-2 text-gray-700">
                    <li class="animate-pulse text-gray-400">最新情報を探知中...</li>
                </ul>
            </div>

            <div id="resultCount" class="text-xs mb-4 text-gray-500 font-bold uppercase tracking-wider">Loading...</div>
            <div id="productList" class="grid grid-cols-1 gap-4"></div>
        </section>
    </main>

    <div id="detailModal" onclick="closeModal()">
        <div class="bg-white p-8 max-w-2xl w-11/12 rounded shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <footer class="border-t border-gray-300 mt-20 p-10 bg-gray-50 text-center">
        <div id="sharpAI" class="max-w-xl mx-auto p-6 bg-white border border-black rounded shadow-md cursor-pointer hover:bg-gray-100 transition">
            <p class="font-bold text-sm mb-1 italic">🤖 シャープAI</p>
            <p class="text-xs text-gray-500">「現在はまだ私が自動で学習中ですが、いずれあなたの完璧な一本を提案します。」</p>
        </div>
        <p class="mt-8 text-[10px] text-gray-400 uppercase tracking-[0.2em]">© 2026 SHARPEN SEARCH DB</p>
    </footer>

    <script>
        // 情報量爆上げデータベース（色データを追加）
        const products = [
            { id:1, name: "クルトガ ダイブ", maker: "三菱鉛筆", price: "5,500", diameter: "0.5", material: "樹脂", colors: ["#1e3a8a", "#064e3b", "#451a03"], colorNames: ["グランブルー", "デンスグリーン", "アビスブルー"], desc: "自動芯出し機能とクルトガエンジンを搭載した最高峰モデル。", tags: "自動芯出し 芯回転" },
            { id:2, name: "オレンズネロ", maker: "ぺんてる", price: "3,300", diameter: "0.3", material: "樹脂", colors: ["#000000"], colorNames: ["マットブラック"], desc: "芯を1回出すだけで使い続けられる自動芯出し機構。極細0.2/0.3に対応。", tags: "自動芯出し 折れない" },
            { id:3, name: "特上欅 シャープペンシル", maker: "野原工芸", price: "11,000〜", diameter: "0.5", material: "木軸", colors: ["#92400e"], colorNames: ["欅(ケヤキ)"], desc: "職人が一本ずつ手作りする木軸ペンの代名詞。使い込むほど艶が出る。", tags: "経年変化 工房系" },
            { id:4, name: "グラフ1000 フォープロ", maker: "ぺんてる", price: "1,100", diameter: "0.5", material: "金属", colors: ["#000000"], colorNames: ["ブラック"], desc: "世界中のプロに愛される製図用シャーペンの完成形。", tags: "製図用 ロングセラー" },
            { id:5, name: "ロットリング 600", maker: "ロットリング", price: "3,300", diameter: "0.5", material: "金属", colors: ["#000000", "#ffffff", "#b91c1c", "#1e40af"], colorNames: ["ブラック", "シルバー", "アイアンブルー", "マダーレッド"], desc: "フルメタルボディの重量感が心地よい。ドイツの歴史的一本。", tags: "海外ブランド 高剛性" }
        ];

        function displayProducts(data) {
            const list = document.getElementById('productList');
            document.getElementById('resultCount').innerText = `${data.length} アイテム`;
            list.innerHTML = "";

            data.forEach(p => {
                const colorDots = p.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join("");
                list.innerHTML += `
                    <div class="amazon-border p-4 flex gap-4 hover:shadow-md transition-all cursor-pointer" onclick="openModal(${p.id})">
                        <div class="w-24 h-24 bg-gray-50 border flex items-center justify-center text-[10px] text-gray-300">IMAGE</div>
                        <div class="flex-grow">
                            <h3 class="text-blue-700 font-bold text-lg leading-tight mb-1">${p.name}</h3>
                            <p class="text-xs text-gray-500 mb-2">${p.maker}</p>
                            <div class="flex items-center gap-2 mb-2">
                                ${colorDots} <span class="text-[10px] text-gray-400">他 ${p.colorNames.length}色</span>
                            </div>
                            <div class="text-red-700 font-bold text-lg">¥${p.price}</div>
                        </div>
                    </div>
                `;
            });
        }

        // 詳細モーダルを開く
        function openModal(id) {
            const p = products.find(item => item.id === id);
            const colorList = p.colors.map((c, i) => `
                <div class="flex items-center gap-2 text-sm">
                    <span class="color-dot w-6 h-6" style="background:${c}"></span>
                    <span>${p.colorNames[i]}</span>
                </div>
            `).join("");

            document.getElementById('modalContent').innerHTML = `
                <h2 class="text-2xl font-bold mb-1">${p.name}</h2>
                <p class="text-gray-500 mb-4">${p.maker} / ${p.diameter}mm / ${p.material}</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h4 class="font-bold text-sm mb-2 border-b">カラーバリエーション</h4>
                        <div class="space-y-2">${colorList}</div>
                    </div>
                    <div>
                        <h4 class="font-bold text-sm mb-2 border-b">製品説明</h4>
                        <p class="text-sm text-gray-600 leading-relaxed">${p.desc}</p>
                        <div class="mt-4 flex flex-wrap gap-1">
                            ${p.tags.split(' ').map(t => `<span class="bg-gray-100 text-[10px] px-2 py-1 rounded border">#${t}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

        // 簡易ニュース自動更新（最新の日付を生成）
        function updateNews() {
            const now = new Date();
            document.getElementById('lastUpdate').innerText = now.toLocaleString();
            const news = [
                `【探知】${now.getMonth()+1}月の限定色トレンド: 「${products[0].colorNames[0]}」がSNSで話題です。`,
                `【速報】${products[2].maker}の販売会情報が更新されました(公式サイトを確認)。`,
                `【分析】最近は「${products[4].material}」素材の低重心モデルが人気急上昇中です。`
            ];
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = news.map(n => `<li>${n}</li>`).join("");
        }

        // 検索機能
        function filter() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const checks = Array.from(document.querySelectorAll('.filter-check:checked')).map(c => c.value);
            const filtered = products.filter(p => {
                const matchQ = p.name.includes(q) || p.maker.includes(q) || p.colorNames.join().includes(q) || p.tags.includes(q);
                const matchCheck = checks.length === 0 || checks.includes(p.diameter) || checks.includes(p.material);
                return matchQ && matchCheck;
            });
            displayProducts(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filter);
        document.querySelectorAll('.filter-check').forEach(c => c.addEventListener('change', filter));
        
        // 初期実行
        displayProducts(products);
        updateNews();
        setInterval(updateNews, 60000); // 1分ごとにニュースを「再スキャン」
    </script>
</body>
</html>
