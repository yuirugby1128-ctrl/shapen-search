<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文房具検索サイト | SHARPEN DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #2dd4bf 100%); }
        .sharp-card { background: white; border-radius: 20px; transition: 0.4s; border: 1px solid #e2e8f0; }
        .sharp-card:hover { transform: translateY(-8px); border-color: #0ea5e9; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary svg { transform: rotate(180deg); }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-6xl mx-auto mt-4 px-4 space-y-2">
        
        <details class="group bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <summary class="flex justify-between items-center p-4 cursor-pointer hover:bg-slate-50 transition">
                <div class="flex items-center gap-3">
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase">News</span>
                    <span class="text-sm font-black text-slate-700 tracking-tighter">最新情報 / お知らせ</span>
                </div>
                <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
            </summary>
            <div class="p-4 border-t border-slate-100 bg-slate-50 text-sm font-medium text-slate-600 space-y-2">
                <p>・2026/04：データベース全500件の統合メンテナンスを実施中。</p>
                <p>・2026/04：クルトガダイブの新色入荷情報を更新しました。</p>
                <p>・2026/04：木軸ペン特集タグを追加しました。</p>
            </div>
        </details>

        <details class="group bg-slate-900 text-white rounded-2xl shadow-xl overflow-hidden">
            <summary class="flex justify-between items-center p-4 cursor-pointer hover:bg-slate-800 transition">
                <div class="flex items-center gap-3">
                    <span class="text-blue-400 text-lg">💙</span>
                    <span class="text-sm font-black tracking-widest uppercase">My Favorites Total</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="totalPrice" class="text-xl font-black italic">¥0</span>
                    <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </summary>
            <div class="p-4 border-t border-slate-700 bg-slate-800 text-xs font-bold text-slate-300">
                <p>お気に入り（💙）に追加した文房具の合計金額です。筆箱構成の予算立てに活用してください。</p>
            </div>
        </details>
    </div>

    <header class="py-10 text-center">
        <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text hero-gradient mb-2 italic">文房具検索サイト</h1>
        <p class="text-[10px] text-slate-400 font-black tracking-[0.3em] uppercase">The Ultimate Stationery Spec Database</p>
    </header>

    <div class="max-w-6xl mx-auto px-4 sticky top-4 z-50">
        <div class="bg-white/90 backdrop-blur-md p-4 rounded-3xl shadow-xl border border-white/20">
            <input type="text" id="search" placeholder="アイテム名、ブランドで検索..." 
                   class="w-full p-4 rounded-2xl bg-slate-100 border-none outline-none focus:ring-2 ring-blue-400 font-bold">
            <div class="flex flex-wrap gap-2 mt-4" id="tagList"></div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="productGrid"></main>

    <script>
        const SPREADSHEET_ID = 'あなたのスプレッドシートID';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
        
        let allItems = [];
        let favList = [];
        let activeTag = '';
        const tags = ["限定色","0.3","0.5","0.7","低重心","六角","木軸","1000円以下","自動心出し","海外","筆箱","その他の文房具","しーさー","ダブルノック","フレフレ搭載","製図用","クルトガ","高級(5000円以上)"];

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                allItems = rows.map(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(c.length < 5) return null;
                    return {
                        name: c[0].replace(/"/g,''),
                        maker: c[1].replace(/"/g,''),
                        tags: c[2].replace(/"/g,'').split(',').map(t=>t.trim()),
                        desc: c[3].replace(/"/g,''),
                        url: c[4].replace(/"/g,''),
                        price: parseInt(c[5]) || 0
                    };
                }).filter(i => i !== null);
                render();
                renderTags();
            } catch (e) { console.error("Error:", e); }
        }

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allItems.filter(item => {
                const matchSearch = (item.name + item.maker).toLowerCase().includes(query);
                const matchTag = activeTag ? item.tags.includes(activeTag) : true;
                return matchSearch && matchTag;
            });

            document.getElementById('productGrid').innerHTML = filtered.map(item => `
                <div class="sharp-card p-8 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest bg-blue-50 px-2 py-1 rounded">${item.maker}</span>
                        <button onclick="toggleFav('${item.name}')" class="text-2xl transition hover:scale-125">
                            ${favList.includes(item.name) ? '💙' : '🤍'}
                        </button>
                    </div>
                    <h2 class="text-xl font-black text-slate-800 mb-2">${item.name}</h2>
                    <div class="flex flex-wrap gap-1 mb-4">
                        ${item.tags.map(t => `<span class="text-[9px] font-bold text-slate-400 border border-slate-200 px-2 py-0.5 rounded-full">#${t}</span>`).join('')}
                    </div>
                    <p class="text-xs text-slate-500 font-medium leading-relaxed flex-grow">${item.desc}</p>
                    <div class="mt-6 flex justify-between items-center">
                        <span class="text-2xl font-black text-slate-900 italic">¥${item.price.toLocaleString()}</span>
                        <a href="${item.url}" target="_blank" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black hover:bg-blue-500 transition shadow-lg">VIEW DETAIL</a>
                    </div>
                </div>
            `).join('');
        }

        function toggleFav(name) {
            if(favList.includes(name)) favList = favList.filter(n => n !== name);
            else favList.push(name);
            const total = allItems.filter(i => favList.includes(i.name)).reduce((sum, i) => sum + i.price, 0);
            document.getElementById('totalPrice').innerText = `¥${total.toLocaleString()}`;
            render();
        }

        function renderTags() {
            document.getElementById('tagList').innerHTML = `<button onclick="setTag('')" class="px-4 py-2 rounded-full text-[10px] font-black ${activeTag===''?'bg-slate-900 text-white':'bg-white border border-slate-200'}">ALL</button>` + 
                tags.map(t => `<button onclick="setTag('${t}')" class="px-4 py-2 rounded-full text-[10px] font-black ${activeTag===t?'bg-blue-500 text-white border-blue-500':'bg-white border border-slate-200 hover:bg-slate-50'}">#${t.toUpperCase()}</button>`).join('');
        }

        function setTag(t) { activeTag = t; renderTags(); render(); }
        document.getElementById('search').addEventListener('input', render);
        fetchData();
    </script>
</body>
</html>
