<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WRITING INSTRUMENT DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f8f9fa; color: #1a1a1a; }
        .sharp-card { background: white; border: 2px solid #000; transition: 0.2s; position: relative; min-height: 180px; display: flex; flex-direction: column; }
        .sharp-card:hover { transform: translate(-4px, -4px); box-shadow: 6px 6px 0px #000; }
        .filter-btn { border: 2px solid #000; background: white; padding: 6px 12px; font-size: 11px; font-weight: 900; cursor: pointer; }
        .filter-btn.active { background: #000; color: #fff; }
        #detailModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .limited-badge { position: absolute; top: 0; left: 0; background: #e63946; color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; z-index: 5; }
        .seasar-badge { position: absolute; top: 0; right: 0; background: #fbbf24; color: black; font-size: 8px; font-weight: 900; padding: 2px 6px; z-index: 5; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white border-b-4 border-black sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-black italic mb-4 cursor-pointer" onclick="location.reload()">WRITING <span class="text-red-600">DB</span></h1>
            <div class="flex flex-wrap gap-2 overflow-x-auto pb-2">
                <button onclick="filterByTag('すべて')" class="filter-btn active">すべて</button>
                <button onclick="filterByTag('しーさー')" class="filter-btn text-yellow-600 border-yellow-600">しーさー</button>
                <button onclick="filterByTag('コラボ')" class="filter-btn text-orange-600 border-orange-600">コラボ</button>
                <button onclick="filterByTag('限定色')" class="filter-btn text-red-600 border-red-600">限定色</button>
                <button onclick="filterByTag('筆箱')" class="filter-btn text-amber-800 border-amber-800">筆箱</button>
            </div>
            <input type="text" id="searchInput" placeholder="検索..." class="w-full border-2 border-black p-3 mt-4 font-bold outline-none focus:bg-yellow-50">
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 mt-8">
        <div id="loading" class="text-center py-20 font-black italic text-gray-400">DATABASE LOADING...</div>
        <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="detailModal" onclick="closeModal()">
        <div class="bg-white max-w-2xl w-full p-8 relative shadow-[10px_10px_0px_#333]" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-4xl">&times;</button>
            <p id="m-maker" class="text-xs font-black text-blue-600 uppercase mb-1"></p>
            <h2 id="m-title" class="text-2xl font-black italic mb-4"></h2>
            <div class="bg-gray-100 p-6 border-2 border-black whitespace-pre-wrap font-bold text-sm" id="m-desc"></div>
        </div>
    </div>

    <script>
        // ★ここに自分のスプレッドシートIDを正しく入れてください
        const SPREADSHEET_ID = '1EouOo6sNYzOLsOgqP1HLNLq9-MZdX-p1owDIFr-kBF0';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

        let allProducts = [];
        let currentFilter = 'すべて';

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).slice(1);
                
                const merged = {};

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 2) return;

                    let fullName = (cols[0] || "").replace(/"/g, '').trim();
                    let maker = (cols[1] || "").replace(/"/g, '').trim();
                    let rawTags = (cols[2] || "").replace(/"/g, '').split(',').map(t => t.trim());
                    let desc = (cols[3] || "").replace(/"/g, '').trim();

                    // 名前からカッコ内の色を抽出して統合
                    const baseName = fullName.split(/[（(]/)[0].trim();
                    const colorMatch = fullName.match(/[（(](.*?)[）)]/);
                    const colorName = colorMatch ? colorMatch[1] : "";

                    if (!merged[baseName]) {
                        merged[baseName] = { name: baseName, maker, tags: new Set(rawTags), desc, colors: new Set() };
                    }
                    if (colorName) merged[baseName].colors.add(colorName);
                    rawTags.forEach(t => merged[baseName].tags.add(t));

                    // しーさー自動タグ
                    if (fullName.includes('しーさー') || merged[baseName].tags.has('しーさー')) {
                        merged[baseName].tags.add('しーさー');
                        merged[baseName].tags.add('コラボ');
                    }
                });

                allProducts = Object.values(merged).map(p => ({
                    ...p,
                    tags: Array.from(p.tags),
                    displayDesc: p.colors.size > 0 
                        ? `【バリエーション: ${Array.from(p.colors).join(' / ')}】\n\n${p.desc}` 
                        : p.desc
                }));

                document.getElementById('loading').style.display = 'none';
                render();
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "読み込みエラーが発生しました。<br>スプレッドシートのIDと共有設定を確認してください。";
            }
        }

        function filterByTag(tag) {
            currentFilter = tag;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === tag));
            render();
        }

        function render() {
            const list = document.getElementById('productList');
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allProducts.filter(p => {
                const matchesSearch = (p.name + p.maker + p.displayDesc).toLowerCase().includes(query);
                const matchesTag = currentFilter === 'すべて' || p.tags.includes(currentFilter);
                return matchesSearch && matchesTag;
            });

            list.innerHTML = filtered.map(p => `
                <div class="sharp-card p-6 cursor-pointer" onclick="openDetail('${encodeURIComponent(p.name)}')">
                    ${p.tags.includes('限定色') ? '<div class="limited-badge">LIMITED</div>' : ''}
                    ${p.tags.includes('しーさー') ? '<div class="seasar-badge">SEASAR</div>' : ''}
                    <p class="text-[9px] font-black text-blue-600 uppercase mb-1">${p.maker}</p>
                    <h3 class="text-sm font-black italic mb-4 border-b-2 border-gray-100 pb-2">
                        ${p.name} ${p.colors.size > 0 ? `<span class="text-[10px] bg-black text-white px-1 ml-1">${p.colors.size}</span>` : ''}
                    </h3>
                    <div class="flex flex-wrap gap-1">
                        ${p.tags.map(t => `<span class="bg-gray-100 text-[8px] px-2 py-1 font-black border border-gray-200">${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function openDetail(name) {
            const p = allProducts.find(item => item.name === decodeURIComponent(name));
            if (!p) return;
            document.getElementById('m-title').innerText = p.name;
            document.getElementById('m-maker').innerText = p.maker;
            document.getElementById('m-desc').innerText = p.displayDesc;
            document.getElementById('detailModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('detailModal').style.display = "none"; }
        document.getElementById('searchInput').addEventListener('input', render);
        loadData();
    </script>
</body>
</html>
